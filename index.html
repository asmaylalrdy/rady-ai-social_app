<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rady Social AI | مساعد المطور</title>
    <!-- الاحتفاظ بجميع روابط الـ Manifest والـ SDK -->
    <link rel="manifest" href="/manifest.json">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* تم الحفاظ على تصميمك الاحترافي الأصلي */
        :root { --pi-purple: #5e2a8d; --pi-dark-purple: #3f1b60; --pi-gold: #f2a900; --bg-color: #f8f9fa; --user-msg: linear-gradient(135deg, #6a11cb, #2575fc); }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg-color); }
        .app-header { background: linear-gradient(135deg, var(--pi-purple), var(--pi-dark-purple)); color: white; padding: 15px; text-align: center; }
        .main-content { flex: 1; overflow-y: auto; padding: 15px; }
        .message { padding: 12px; margin: 10px 0; border-radius: 15px; max-width: 85%; }
        .message.ai { background: white; align-self: flex-start; border: 1px solid #ddd; }
        .message.user { background: var(--user-msg); color: white; align-self: flex-end; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1.5px solid #ccc; border-radius: 25px; outline: none; }
        .send-btn { background: var(--pi-purple); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="app-header"><h1>Rady Social AI</h1><p>أهلاً يا إسماعيل، أنا جاهز لأوامرك</p></header>

    <main class="main-content" id="chat-box">
        <div class="message ai">أهلاً يا باشمهندس إسماعيل! أنا رفيقك الذكي. ما هي الخطوة البرمجية التالية التي سننفذها في منصتنا اليوم؟</div>
    </main>

    <footer class="input-area">
        <input type="text" id="user-input" placeholder="اكتب أمرك البرمجي هنا...">
        <button class="send-btn" onclick="sendMessage()">إرسال</button>
    </footer>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            if (!text) return;

            chatBox.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            
            // محرك الاستجابة الودي الجديد
            setTimeout(() => {
                const response = getRadyResponse(text);
                chatBox.innerHTML += `<div class="message ai">${response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
        }

        function getRadyResponse(text) {
            text = text.toLowerCase();
            if (text.includes('كود') || text.includes('برمجة') || text.includes('تعديل')) {
                return "أبشر يا إسماعيل! سأقوم بتحليل الكود فوراً. هل تريد مني إعادة هيكلة الـ logic أم إضافة ميزة جديدة للمنصة؟";
            }
            if (text.includes('شكرا')) return "العفو يا هندسة، هذا واجبي تجاه شريك نجاحي!";
            return "فكرة ممتازة يا إسماعيل! دعنا نغوص في التفاصيل. كيف أساعدك في تنفيذ ذلك الآن؟";
        }
    </script>
</body>
</html>
